<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>神獸天賦能力值計算</title>
<style>
*{box-sizing:border-box}
body{font-family:Arial,"Microsoft JhengHei",sans-serif;padding:16px;max-width:820px;margin:auto;background:#f7f7f7;color:#111}
h1{text-align:center;font-size:28px;margin:16px 0 20px}
h2{margin:0 0 12px;font-size:22px}
.card{background:#fff;padding:16px;border-radius:14px;box-shadow:0 2px 10px rgba(0,0,0,.1);margin-bottom:16px;overflow:hidden}
.species-row{display:grid;grid-template-columns:92px 1fr 42px 42px;gap:8px;align-items:center;margin-bottom:12px}
.grade-row{display:grid;grid-template-columns:92px 1fr;gap:10px;align-items:center;margin-bottom:16px}
.stat-header,.stat-row{display:grid;grid-template-columns:92px 72px 1fr;gap:10px;align-items:center}
.stat-header{margin-bottom:8px;color:#777;font-weight:bold;font-size:13px}
.stat-row{margin-bottom:10px}
.row-head{font-weight:bold;font-size:16px}
.base-value{text-align:center;color:#666;background:#f1f1f1;border-radius:10px;padding:11px 6px;font-weight:bold;min-height:42px}
input,select{width:100%;padding:11px 12px;border:1px solid #ddd;border-radius:10px;font-size:16px;background:#fff}
.add-btn,.remove-btn{height:42px;border:none;border-radius:10px;color:#fff;font-size:24px;font-weight:bold;cursor:pointer}
.add-btn{background:#2563eb}.remove-btn{background:#d32f2f}.remove-btn:disabled{background:#bbb;cursor:not-allowed}
.main-btn{width:100%;padding:13px;margin-top:8px;background:#16a34a;color:#fff;border:none;border-radius:10px;font-size:18px;font-weight:bold;cursor:pointer}
.result{font-size:28px;font-weight:bold;text-align:center;margin-top:18px;word-break:break-word}
.table-wrap{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:max-content;min-width:100%;border-collapse:collapse;background:#fff;font-size:14px;table-layout:auto}
th,td{padding:9px 10px;text-align:center;border-bottom:1px solid #ddd;white-space:nowrap;vertical-align:middle}
.top3{background:#fff3a3;font-weight:bold}.grade-edit{cursor:pointer;color:#1976d2;font-weight:bold}
.action-cell{opacity:0;transition:.2s}tr:hover .action-cell{opacity:1}
.icon-btn{width:32px;height:30px;border:none;border-radius:8px;cursor:pointer;font-size:15px;color:#fff;line-height:30px;padding:0}
.copy-btn{background:#ff9800}.del-btn{background:#d32f2f}
.actions{display:flex;gap:10px;margin-top:16px}.actions button{flex:1;min-width:0;padding:12px 8px;border:none;border-radius:10px;color:#fff;cursor:pointer;font-size:15px;font-weight:bold}
.keep{background:#b00020}.clear{background:#666}
.note{margin-top:12px;font-size:13px;color:#666;line-height:1.6;text-align:center}
@media(max-width:768px){body{padding:12px;max-width:100%}h1{font-size:24px}.card{padding:14px;border-radius:12px}.result{font-size:26px}.action-cell{opacity:1}th,td{padding:8px 9px;font-size:13px}}
@media(max-width:430px){body{padding:10px}h1{font-size:22px}.species-row{grid-template-columns:78px 1fr 38px 38px;gap:7px}.grade-row{grid-template-columns:78px 1fr;gap:8px}.stat-header,.stat-row{grid-template-columns:78px 56px 1fr;gap:8px}.row-head{font-size:15px}.base-value{padding:11px 4px;font-size:14px}input,select{padding:10px;font-size:15px}.actions button{font-size:14px;padding:11px 6px}.note{font-size:12px}}
</style>
</head>
<body>
<h1>神獸天賦能力值計算</h1>
<div class="card">
  <div class="species-row">
    <div class="row-head">神獸蛋種類</div>
    <select id="eggType" onchange="updateBaseDisplay()"></select>
    <button class="add-btn" onclick="addEggType()" title="增加蛋的種類">+</button>
    <button class="remove-btn" id="removeEggBtn" onclick="removeEggType()" title="刪除自訂蛋種類">-</button>
  </div>
  <div class="grade-row">
    <div class="row-head">級別</div>
    <select id="grade">
      <option value="S+">S+</option><option value="S">S</option><option value="A" selected>A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option>
    </select>
  </div>
  <div class="stat-header"><div>欄位名稱</div><div>基本值</div><div>輸入框</div></div>
  <div id="statInputs"></div>
  <button class="main-btn" onclick="calculate()">計算</button>
  <div class="result" id="result">尚未計算</div>
</div>

<div class="card">
  <h2>歷史紀錄（共 <span id="count">0</span> 筆）</h2>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>HP</th><th>MP</th><th>攻擊</th><th>防禦</th><th>速度</th><th>爆擊</th><th>迴避</th><th>天賦綜合值</th><th>級別</th><th>神獸蛋種類</th><th>時間</th><th>複製</th><th>刪除</th>
        </tr>
      </thead>
      <tbody id="history"></tbody>
    </table>
  </div>
  <div class="actions">
    <button class="keep" onclick="keepTop3Only()">保留最好的3筆</button>
    <button class="clear" onclick="clearAllHistory()">全數刪除</button>
  </div>
  <div class="note">提醒：本資料僅存在本機瀏覽器的暫存資料中，並不會傳送資料。</div>
</div>

<script>
const statDefs=[
  {key:"hp",label:"HP"},{key:"mp",label:"MP"},{key:"atk",label:"攻擊"},{key:"def",label:"防禦"},{key:"spd",label:"速度"},{key:"crit",label:"爆擊"},{key:"eva",label:"迴避"}
];
const defaultEggTypes={
  "白玉蛋":{hp:104,mp:32,atk:16,def:13,spd:11,crit:10,eva:8},
  "歲月蛋":{hp:122,mp:36,atk:17,def:16,spd:12,crit:13,eva:10}
};
let customEggTypes=JSON.parse(localStorage.getItem("customEggTypes"))||{};
let historyData=JSON.parse(localStorage.getItem("historyData"))||[];

function getEggTypes(){return {...defaultEggTypes,...customEggTypes}}
function saveHistory(){localStorage.setItem("historyData",JSON.stringify(historyData))}
function saveCustomEggTypes(){localStorage.setItem("customEggTypes",JSON.stringify(customEggTypes))}

function init(){renderEggOptions();renderStatInputs();loadFromUrl();updateBaseDisplay();renderHistory()}

function renderEggOptions(selectedName){
  const select=document.getElementById("eggType");
  const current=selectedName||select.value||"白玉蛋";
  select.innerHTML="";
  Object.keys(getEggTypes()).forEach(name=>{
    const option=document.createElement("option");
    option.value=name;option.textContent=name;select.appendChild(option);
  });
  select.value=getEggTypes()[current]?current:"白玉蛋";
  updateRemoveButton();
}
function updateRemoveButton(){
  const eggName=document.getElementById("eggType").value;
  document.getElementById("removeEggBtn").disabled=!customEggTypes[eggName];
}
function renderStatInputs(){
  const wrap=document.getElementById("statInputs");
  wrap.innerHTML="";
  statDefs.forEach(stat=>{
    const row=document.createElement("div");
    row.className="stat-row";
    row.innerHTML=`<div class="row-head">${stat.label}</div><div class="base-value" id="base_${stat.key}">-</div><input type="number" id="${stat.key}" inputmode="numeric">`;
    wrap.appendChild(row);
  });
}
function updateBaseDisplay(){
  const eggName=document.getElementById("eggType").value;
  const base=getEggTypes()[eggName];
  statDefs.forEach(stat=>document.getElementById("base_"+stat.key).textContent=base?base[stat.key]:"-");
  updateRemoveButton();
}
function getTimeText(){
  const now=new Date();
  const month=now.getMonth()+1,day=now.getDate();
  const hour=String(now.getHours()).padStart(2,"0");
  const minute=String(now.getMinutes()).padStart(2,"0");
  const second=String(now.getSeconds()).padStart(2,"0");
  return `${month}/${day} ${hour}:${minute}:${second}`;
}
function addEggType(){
  const name=prompt("請輸入新的神獸蛋種類名稱");
  if(!name)return;
  const trimmedName=name.trim();
  if(!trimmedName)return;
  if(getEggTypes()[trimmedName]&&!confirm("這個蛋種類已存在，要覆蓋基本值嗎？"))return;
  const newBase={};
  for(const stat of statDefs){
    const value=prompt(`請輸入「${trimmedName}」的基本值：${stat.label}`);
    if(value===null)return;
    const numberValue=Number(value);
    if(value.trim()===""||Number.isNaN(numberValue)){alert("基本值必須是數字，新增已取消");return}
    newBase[stat.key]=numberValue;
  }
  customEggTypes[trimmedName]=newBase;
  saveCustomEggTypes();renderEggOptions(trimmedName);updateBaseDisplay();alert("已新增神獸蛋種類");
}
function removeEggType(){
  const eggName=document.getElementById("eggType").value;
  if(!customEggTypes[eggName])return;
  if(!confirm(`確定刪除自訂神獸蛋種類「${eggName}」？`))return;
  delete customEggTypes[eggName];
  saveCustomEggTypes();renderEggOptions("白玉蛋");updateBaseDisplay();
}
function calculate(){
  const eggName=document.getElementById("eggType").value;
  const grade=document.getElementById("grade").value;
  const base=getEggTypes()[eggName];
  if(!base){alert("請選擇神獸蛋種類");return}
  const data={};
  for(const stat of statDefs){
    const input=document.getElementById(stat.key);
    if(input.value===""){alert(`請輸入 ${stat.label}`);return}
    data[stat.key]=Number(input.value);
  }
  const diff=statDefs.reduce((sum,stat)=>sum+(data[stat.key]-base[stat.key]),0);
  const sign=diff>=0?"+":"";
  document.getElementById("result").textContent=`天賦綜合值：${sign}${diff}`;
  historyData.unshift({id:Date.now(),timeText:getTimeText(),eggName,grade,...data,diff});
  saveHistory();renderHistory();clearInputs();
}
function clearInputs(){
  statDefs.forEach(stat=>document.getElementById(stat.key).value="");
  document.getElementById("grade").value="A";
}
function renderHistory(){
  document.getElementById("count").textContent=historyData.length;
  const tbody=document.getElementById("history");
  tbody.innerHTML="";
  const top3=[...historyData].sort((a,b)=>b.diff-a.diff).slice(0,3);
  historyData.forEach(item=>{
    const tr=document.createElement("tr");
    if(top3.includes(item))tr.classList.add("top3");
    const sign=item.diff>=0?"+":"";
    tr.innerHTML=`
      <td>${item.hp??""}</td><td>${item.mp??""}</td><td>${item.atk??""}</td><td>${item.def??""}</td><td>${item.spd??""}</td><td>${item.crit??""}</td><td>${item.eva??""}</td>
      <td>${sign}${item.diff}</td>
      <td class="grade-edit" onclick="editGrade(${item.id})">${item.grade||"-"}</td>
      <td>${item.eggName||"-"}</td>
      <td>${item.timeText||"-"}</td>
      <td class="action-cell"><button class="icon-btn copy-btn" onclick="copyShareUrl(${item.id})" title="複製分享網址">📋</button></td>
      <td class="action-cell"><button class="icon-btn del-btn" onclick="deleteRecord(${item.id})" title="刪除">✕</button></td>`;
    tbody.appendChild(tr);
  });
}
function editGrade(id){
  const item=historyData.find(x=>x.id===id);
  if(!item)return;
  const value=prompt("請輸入級別：S+、S、A、B、C、D 或自行輸入",item.grade||"A");
  if(value===null)return;
  item.grade=value.trim();saveHistory();renderHistory();
}
function copyShareUrl(id){
  const item=historyData.find(x=>x.id===id);
  if(!item)return;
  const url=new URL(window.location.origin+window.location.pathname);
  url.searchParams.set("egg",item.eggName||"");
  url.searchParams.set("grade",item.grade||"");
  statDefs.forEach(stat=>url.searchParams.set(stat.key,item[stat.key]));
  url.searchParams.set("diff",item.diff);
  if(customEggTypes[item.eggName]){
    const base=getEggTypes()[item.eggName];
    statDefs.forEach(stat=>url.searchParams.set("base_"+stat.key,base[stat.key]));
  }
  const text=url.toString();
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>alert("已複製分享網址")).catch(()=>fallbackCopy(text));
  }else{fallbackCopy(text)}
}
function fallbackCopy(text){prompt("請手動複製這個分享網址",text)}
function deleteRecord(id){
  if(!confirm("確定刪除這筆紀錄？"))return;
  historyData=historyData.filter(x=>x.id!==id);
  saveHistory();renderHistory();
}
function keepTop3Only(){
  if(!confirm("確定只保留最好的3筆？其他紀錄會刪除。"))return;
  historyData=[...historyData].sort((a,b)=>b.diff-a.diff).slice(0,3);
  saveHistory();renderHistory();
}
function clearAllHistory(){
  if(!confirm("確定刪除全部紀錄？"))return;
  historyData=[];
  localStorage.removeItem("historyData");
  renderHistory();
}
function loadFromUrl(){
  const params=new URLSearchParams(window.location.search);
  if(!params.has("egg"))return;
  const eggName=params.get("egg")||"白玉蛋";
  if(!getEggTypes()[eggName]){
    const newBase={};
    let hasFullBase=true;
    statDefs.forEach(stat=>{
      const value=params.get("base_"+stat.key);
      if(value===null||value==="")hasFullBase=false;
      newBase[stat.key]=Number(value);
    });
    if(hasFullBase){customEggTypes[eggName]=newBase;saveCustomEggTypes()}
  }
  renderEggOptions(eggName);
  document.getElementById("eggType").value=getEggTypes()[eggName]?eggName:"白玉蛋";
  document.getElementById("grade").value=params.get("grade")||"A";
  statDefs.forEach(stat=>document.getElementById(stat.key).value=params.get(stat.key)||"");
  updateBaseDisplay();
  const diff=params.get("diff");
  if(diff!==null&&diff!==""){
    const n=Number(diff),sign=n>=0?"+":"";
    document.getElementById("result").textContent=`天賦綜合值：${sign}${n}`;
  }
}
init();
</script>
</body>
</html>
