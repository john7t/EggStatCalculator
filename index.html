<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>能力值評級</title>
  <style>
    body {
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      padding: 20px;
      max-width: 620px;
      margin: auto;
      background: #f7f7f7;
    }

    h1 { text-align: center; }

    .card {
      background: white;
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 4px;
      box-sizing: border-box;
      font-size: 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 8px;
      font-weight: bold;
    }

    .main-btn {
      width: 100%;
      margin-top: 16px;
      padding: 12px;
      font-size: 18px;
      background: #333;
      color: white;
    }

    .danger-btn {
      width: 100%;
      margin-top: 16px;
      padding: 12px;
      font-size: 16px;
      background: #b00020;
      color: white;
    }

    .copy-btn {
      width: 34px;
      height: 30px;
      font-size: 18px;
      background: #ff9800;
      color: white;
    }
    .delete-btn {
      width: 34px;
      height: 30px;
      font-size: 16px;
      background: #d32f2f;
      color: white;
    }
    
    .action-cell {
      opacity: 0;
      transition: 0.2s;
    }
    
    tr:hover .action-cell {
      opacity: 1;
    }
    
    @media (max-width: 768px) {
      .action-cell {
        opacity: 1;
      }
    }

    .result {
      font-size: 28px;
      font-weight: bold;
      text-align: center;
      margin-top: 16px;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      font-size: 14px;
      min-width: 560px;
    }

    th, td {
      padding: 8px 6px;
      border-bottom: 1px solid #ddd;
      text-align: center;
      white-space: nowrap;
    }

    th:first-child,
    td:first-child {
      width: 74px;
      padding-left: 4px;
      padding-right: 4px;
    }

    .top3 {
      background: #fff3a3;
      font-weight: bold;
    }

    .note {
      margin-top: 12px;
      font-size: 13px;
      color: #666;
      line-height: 1.6;
      text-align: center;
    }
  </style>
</head>
<body>

  <h1>能力值評級</h1>

  <div class="card">
    <label>HP</label>
    <input type="number" id="hp" placeholder="請輸入 HP">

    <label>MP</label>
    <input type="number" id="mp" placeholder="請輸入 MP">

    <label>攻擊</label>
    <input type="number" id="atk" placeholder="請輸入攻擊">

    <label>防禦</label>
    <input type="number" id="def" placeholder="請輸入防禦">

    <label>速度</label>
    <input type="number" id="spd" placeholder="請輸入速度">

    <button class="main-btn" onclick="calculate()">計算</button>

    <div class="result" id="result">尚未計算</div>
  </div>

  <div class="card">
    <h2>歷史紀錄</h2>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>時間</th>
            <th>結果</th>
            <th>HP</th>
            <th>MP</th>
            <th>攻擊</th>
            <th>防禦</th>
            <th>速度</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="history"></tbody>
      </table>
    </div>

    <button class="danger-btn" onclick="keepTop3Only()">只保留最好的3筆，其他刪除</button>

    <div class="note">
      提醒：本資料僅存在本機瀏覽器的暫存資料中，並不會傳送資料。
    </div>
  </div>

  <script>
    const base = {
      hp: 104,
      mp: 32,
      atk: 16,
      def: 13,
      spd: 11
    };

    let historyData = JSON.parse(localStorage.getItem("historyData")) || [];

    function getTimeText() {
      const now = new Date();
      const day = String(now.getDate()).padStart(2, "0");
      const hour = String(now.getHours()).padStart(2, "0");
      const minute = String(now.getMinutes()).padStart(2, "0");
      const second = String(now.getSeconds()).padStart(2, "0");
      return `${day} ${hour}:${minute}:${second}`;
    }

    function calculate() {
      const data = {
        hp: Number(document.getElementById("hp").value),
        mp: Number(document.getElementById("mp").value),
        atk: Number(document.getElementById("atk").value),
        def: Number(document.getElementById("def").value),
        spd: Number(document.getElementById("spd").value)
      };

      if (
        document.getElementById("hp").value === "" ||
        document.getElementById("mp").value === "" ||
        document.getElementById("atk").value === "" ||
        document.getElementById("def").value === "" ||
        document.getElementById("spd").value === ""
      ) {
        alert("請輸入所有數值");
        return;
      }

      const diff =
        (data.hp - base.hp) +
        (data.mp - base.mp) +
        (data.atk - base.atk) +
        (data.def - base.def) +
        (data.spd - base.spd);

      let rank = "";
      if (diff >= -6) {
        rank = "A";
      } else if (diff === -7) {
        rank = "B";
      } else {
        rank = "C";
      }

      const sign = diff >= 0 ? "+" : "";
      const resultText = `${rank}${sign}${diff}`;

      document.getElementById("result").textContent = resultText;

      historyData.unshift({
        id: Date.now(),
        timeText: getTimeText(),
        ...data,
        diff,
        resultText
      });

      saveHistory();
      renderHistory();
      clearInputs();
    }

    function copyRecord(id) {
      const item = historyData.find(x => x.id === id);
      if (!item) return;

      const url = new URL(window.location.href);
      url.searchParams.set("hp", item.hp);
      url.searchParams.set("mp", item.mp);
      url.searchParams.set("atk", item.atk);
      url.searchParams.set("def", item.def);
      url.searchParams.set("spd", item.spd);
      url.searchParams.set("result", item.resultText);

      navigator.clipboard.writeText(url.toString())
        .then(() => alert("已複製，可貼給對方"))
        .catch(() => alert("複製失敗，請手動複製網址"));
    }

    function deleteRecord(id) {
    if (!confirm("確定刪除這筆紀錄？")) {
      return;
    }
  
    historyData = historyData.filter(x => x.id !== id);
  
    saveHistory();
    renderHistory();
  }

    function keepTop3Only() {
      if (!confirm("確定只保留最好的3筆？其他紀錄會刪除。")) return;

      historyData = [...historyData]
        .sort((a, b) => b.diff - a.diff)
        .slice(0, 3);

      saveHistory();
      renderHistory();
    }

    function clearInputs() {
      document.getElementById("hp").value = "";
      document.getElementById("mp").value = "";
      document.getElementById("atk").value = "";
      document.getElementById("def").value = "";
      document.getElementById("spd").value = "";
    }

    function saveHistory() {
      localStorage.setItem("historyData", JSON.stringify(historyData));
    }

    function renderHistory() {
      const tbody = document.getElementById("history");
      tbody.innerHTML = "";

      const top3 = [...historyData]
        .sort((a, b) => b.diff - a.diff)
        .slice(0, 3);

      historyData.forEach(item => {
        const isTop3 = top3.includes(item);

        const tr = document.createElement("tr");
        if (isTop3) tr.classList.add("top3");

        tr.innerHTML = `
          <td>${item.timeText || "-"}</td>
          <td>${item.resultText}</td>
          <td>${item.hp}</td>
          <td>${item.mp}</td>
          <td>${item.atk}</td>
          <td>${item.def}</td>
          <td>${item.spd}</td>
          <td class="action-cell">
            <button
              class="copy-btn"
              onclick="copyRecord(${item.id})"
              title="複製"
            >
              📋
            </button>
          
            <button
              class="delete-btn"
              onclick="deleteRecord(${item.id})"
              title="刪除"
            >
              ✕
            </button>
          </td>
        `;

        tbody.appendChild(tr);
      });
    }

    function loadFromUrl() {
      const params = new URLSearchParams(window.location.search);

      if (!params.has("hp")) return;

      document.getElementById("hp").value = params.get("hp") || "";
      document.getElementById("mp").value = params.get("mp") || "";
      document.getElementById("atk").value = params.get("atk") || "";
      document.getElementById("def").value = params.get("def") || "";
      document.getElementById("spd").value = params.get("spd") || "";

      const result = params.get("result");
      if (result) {
        document.getElementById("result").textContent = result;
      }
    }

    loadFromUrl();
    renderHistory();
  </script>

</body>
</html>
