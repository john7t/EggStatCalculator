<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>神獸天賦能力值計算</title>
<style>
body{font-family:Arial,"Microsoft JhengHei",sans-serif;padding:20px;max-width:760px;margin:auto;background:#f7f7f7}
.card{background:#fff;padding:16px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.1);margin-bottom:16px}
h1{text-align:center}
input{width:100%;padding:10px;margin-top:4px;box-sizing:border-box;border:1px solid #ddd;border-radius:8px}
label{display:block;margin-top:10px;font-weight:bold}
.main-btn{width:100%;padding:12px;margin-top:16px;background:#333;color:#fff;border:none;border-radius:8px}
.result{font-size:28px;font-weight:bold;text-align:center;margin-top:16px}
table{width:100%;border-collapse:collapse;background:#fff}
th,td{padding:8px;text-align:center;border-bottom:1px solid #ddd}
.top3{background:#fff3a3;font-weight:bold}
.action-cell{opacity:0;transition:.2s}
tr:hover .action-cell{opacity:1}
@media(max-width:768px){.action-cell{opacity:1}}
.icon-btn{border:none;border-radius:6px;padding:4px 8px;cursor:pointer}
.copy-btn{background:#ff9800;color:white}
.del-btn{background:#d32f2f;color:white}
.actions{display:flex;gap:10px;margin-top:16px}
.actions button{flex:1;padding:12px;border:none;border-radius:8px;color:white;cursor:pointer}
.keep{background:#b00020}
.clear{background:#666}
.note{margin-top:12px;font-size:13px;color:#666;text-align:center}
.level-edit{cursor:pointer;color:#1976d2}
</style>
</head>
<body>

<h1>神獸天賦能力值計算</h1>

<div class="card">
<label>等級</label>
<input type="text" id="grade" placeholder="可省略">

<label>HP</label>
<input type="number" id="hp">

<label>MP</label>
<input type="number" id="mp">

<label>攻擊</label>
<input type="number" id="atk">

<label>防禦</label>
<input type="number" id="def">

<label>速度</label>
<input type="number" id="spd">

<button class="main-btn" onclick="calculate()">計算</button>

<div class="result" id="result">尚未計算</div>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>時間</th>
<th>等級</th>
<th>HP</th>
<th>MP</th>
<th>攻擊</th>
<th>防禦</th>
<th>速度</th>
<th>天賦綜合值</th>
<th></th>
</tr>
</thead>
<tbody id="history"></tbody>
</table>

<div class="actions">
<button class="keep" onclick="keepTop3Only()">保留最好的3筆</button>
<button class="clear" onclick="clearAllHistory()">全數刪除</button>
</div>

<div class="note">
提醒：本資料僅存在本機瀏覽器的暫存資料中，並不會傳送資料。
</div>
</div>

<script>
const base={hp:104,mp:32,atk:16,def:13,spd:11};
let historyData=JSON.parse(localStorage.getItem("historyData"))||[];

function save(){localStorage.setItem("historyData",JSON.stringify(historyData));}

function calculate(){
const grade=document.getElementById("grade").value.trim();
const hp=Number(document.getElementById("hp").value);
const mp=Number(document.getElementById("mp").value);
const atk=Number(document.getElementById("atk").value);
const def=Number(document.getElementById("def").value);
const spd=Number(document.getElementById("spd").value);

if([hp,mp,atk,def,spd].some(v=>Number.isNaN(v)||v==="")){
alert("請輸入所有能力值");
return;
}

const diff=(hp-base.hp)+(mp-base.mp)+(atk-base.atk)+(def-base.def)+(spd-base.spd);
const sign=diff>=0?"+":"";

historyData.unshift({
id:Date.now(),
time:new Date().toLocaleTimeString("zh-TW",{hour12:false}),
grade,
hp,mp,atk,def,spd,
diff
});

save();
render();

document.getElementById("result").textContent="天賦綜合值："+sign+diff;
["grade","hp","mp","atk","def","spd"].forEach(id=>document.getElementById(id).value="");
}

function render(){
const tbody=document.getElementById("history");
tbody.innerHTML="";

const top3=[...historyData].sort((a,b)=>b.diff-a.diff).slice(0,3);

historyData.forEach(item=>{
const tr=document.createElement("tr");
if(top3.includes(item)) tr.classList.add("top3");

const sign=item.diff>=0?"+":"";

tr.innerHTML=`
<td>${item.time}</td>
<td class="level-edit" onclick="editGrade(${item.id})">${item.grade||"-"}</td>
<td>${item.hp}</td>
<td>${item.mp}</td>
<td>${item.atk}</td>
<td>${item.def}</td>
<td>${item.spd}</td>
<td>${sign}${item.diff}</td>
<td class="action-cell">
<button class="icon-btn copy-btn" onclick="copyRecord(${item.id})">📋</button>
<button class="icon-btn del-btn" onclick="deleteRecord(${item.id})">✕</button>
</td>`;
tbody.appendChild(tr);
});
}

function editGrade(id){
const item=historyData.find(x=>x.id===id);
const value=prompt("請輸入等級",item.grade||"");
if(value===null)return;
item.grade=value;
save();
render();
}

function copyRecord(id){
const item=historyData.find(x=>x.id===id);
navigator.clipboard.writeText(JSON.stringify(item));
alert("已複製");
}

function deleteRecord(id){
historyData=historyData.filter(x=>x.id!==id);
save();render();
}

function keepTop3Only(){
historyData=[...historyData].sort((a,b)=>b.diff-a.diff).slice(0,3);
save();render();
}

function clearAllHistory(){
if(confirm("確定刪除全部紀錄？")){
historyData=[];
localStorage.removeItem("historyData");
render();
}
}

render();
</script>
</body>
</html>
